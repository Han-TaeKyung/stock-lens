name: 📈 주가 데이터 자동 업데이트

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  update-stock-data:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # ← 추가 (기본 60분 → 120분)
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 패키지 설치
        run: |
          pip install yfinance finance-datareader pandas ta

      - name: 🔄 주가 데이터 수집
        run: |
          python python/fetch_data.py

      - name: 📊 매매 신호 탐지
        run: |
          python python/fetch_signals.py

      - name: 🔔 박스권 이탈 알림 (카카오워크)
        env:
          KAKAO_WEBHOOK_URLS: ${{ secrets.KAKAO_WEBHOOK_URLS }}
          WATCH_CODES: ${{ secrets.WATCH_CODES }}  # ← 추가
        run: |
          python python/send_alert.py

      - name: 💾 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "auto: 주가 데이터 + 신호 업데이트 $(date +'%Y-%m-%d')"
          git push