name: 📈 주가 데이터 자동 업데이트

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  update-stock-data:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 패키지 설치
        run: |
          pip install yfinance finance-datareader pandas ta

      - name: 🔄 주가 데이터 수집
        run: |
          python python/fetch_data.py

      - name: 💾 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "auto: 주가 데이터 업데이트 $(date +'%Y-%m-%d')"
          git push