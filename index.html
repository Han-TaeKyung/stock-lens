<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockLens</title>
  <link rel="stylesheet" href="css/token.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 헤더 -->
  <header class="header">
    <div class="header-left">
      <span class="logo">StockLens</span>
    </div>
    <div class="header-center">
      <div class="search-wrap">
        <input type="text" id="searchInput" class="search-input" placeholder="종목명 또는 코드 검색...">
        <ul id="searchResult" class="search-result hidden"></ul>
      </div>
    </div>
    <div class="header-right">
      <div class="market-tabs">
        <button class="market-tab active" data-market="ALL">전체</button>
        <button class="market-tab" data-market="KOSPI">코스피</button>
        <button class="market-tab" data-market="KOSDAQ">코스닥</button>
        <button class="market-tab" data-market="NASDAQ">나스닥</button>
      </div>
      <div class="page-tabs">
        <button class="page-tab active" data-tab="chart">차트</button>
        <button class="page-tab" data-tab="backtest">백테스트</button>
      </div>
    </div>
  </header>

  <!-- 메인 레이아웃 -->
  <div class="layout">

    <!-- 사이드바 -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">관심 종목</div>
        <ul id="watchlist" class="watchlist"></ul>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">최근 조회</div>
        <ul id="recentList" class="watchlist"></ul>
      </div>
    </aside>

    <!-- 차트 영역 -->
    <main class="chart-area">

      <!-- 종목 정보 바 -->
      <div class="stock-info-bar" id="stockInfoBar">
        <div class="stock-info-left">
          <span class="stock-name" id="stockName">종목을 선택하세요</span>
          <span class="stock-code" id="stockCode"></span>
        </div>
        <div class="stock-info-right">
          <span class="stock-price" id="stockPrice">—</span>
          <span class="stock-change" id="stockChange"></span>
        </div>
      </div>

      <!-- 차트 컨트롤 -->
      <div class="chart-controls">
        <div class="period-tabs">
          <button class="period-tab active" data-period="D">일</button>
          <button class="period-tab" data-period="W">주</button>
          <button class="period-tab" data-period="M">월</button>
        </div>
        <div class="ma-toggles">
          <button class="ma-toggle active" data-ma="ma5" style="--ma-color: var(--chart-ma5)">MA5</button>
          <button class="ma-toggle active" data-ma="ma20" style="--ma-color: var(--chart-ma20)">MA20</button>
          <button class="ma-toggle active" data-ma="ma60" style="--ma-color: var(--chart-ma60)">MA60</button>
          <button class="ma-toggle" data-ma="ma120" style="--ma-color: var(--chart-ma120)">MA120</button>
        </div>
      </div>

      <div class="signal-filters">
        <span class="signal-filter-label">신호</span>
        <button class="signal-filter active" data-signal="golden_cross_5_20" style="--sc: #4ade80">골든X(5×20)</button>
        <button class="signal-filter active" data-signal="golden_cross_20_60" style="--sc: #4ade80">골든X(20×60)</button>
        <button class="signal-filter active" data-signal="dead_cross_5_20" style="--sc: #f87171">데드X(5×20)</button>
        <button class="signal-filter active" data-signal="dead_cross_20_60" style="--sc: #f87171">데드X(20×60)</button>
        <button class="signal-filter active" data-signal="pullback_ma20" style="--sc: #4ade80">눌림(20)</button>
        <button class="signal-filter active" data-signal="pullback_ma60" style="--sc: #4ade80">눌림(60)</button>
        <button class="signal-filter active" data-signal="rsi_oversold" style="--sc: #60a5fa">RSI↑</button>
        <button class="signal-filter active" data-signal="rsi_overbought" style="--sc: #f87171">RSI↓</button>
        <button class="signal-filter active" data-signal="disparity_ma5" style="--sc: #f59e0b">이격(5)</button>
        <button class="signal-filter active" data-signal="disparity_ma20" style="--sc: #f59e0b">이격(20)</button>
        <button class="signal-filter active" data-signal="bb_upper_break" style="--sc: #f87171">BB↑</button>
        <button class="signal-filter active" data-signal="bb_lower_break" style="--sc: #4ade80">BB↓</button>
        <button class="signal-filter active" data-signal="ma60_breakdown" style="--sc: #f87171">60선이탈</button>
      </div>
      <!-- 메인 차트 -->
      <div id="mainChart" class="chart-container"></div>

      <!-- 거래량 차트 -->
      <div id="volumeChart" class="chart-container volume"></div>

      <!-- 서브 지표 탭 -->
      <div class="indicator-tabs">
        <button class="indicator-tab active" data-indicator="rsi">RSI</button>
        <button class="indicator-tab" data-indicator="macd">MACD</button>
        <button class="indicator-tab" data-indicator="bb">볼린저밴드</button>
      </div>
      <div id="subChart" class="chart-container sub"></div>

    </main>

    <!-- ── 신호 요약 패널 (새로 추가) ── -->
    <aside class="signal-panel" id="signalPanel">
      <div class="sp-header">
        <span class="sp-title">신호 분석</span>
        <span class="sp-updated" id="spUpdated">—</span>
      </div>

      <!-- 매수/매도 강도 게이지 -->
      <div class="sp-gauge-wrap">
        <div class="sp-gauge-item">
          <div class="sp-gauge-label">
            <span style="color:var(--color-up)">▲ 매수</span>
            <span class="sp-gauge-score" id="buyScore">0</span>
          </div>
          <div class="sp-gauge-bar">
            <div class="sp-gauge-fill buy" id="buyBar" style="width:0%"></div>
          </div>
        </div>
        <div class="sp-gauge-item">
          <div class="sp-gauge-label">
            <span style="color:var(--color-down)">▼ 매도</span>
            <span class="sp-gauge-score" id="sellScore">0</span>
          </div>
          <div class="sp-gauge-bar">
            <div class="sp-gauge-fill sell" id="sellBar" style="width:0%"></div>
          </div>
        </div>
        <div class="sp-gauge-item">
          <div class="sp-gauge-label">
            <span style="color:var(--color-warning)">● 주의</span>
            <span class="sp-gauge-score" id="cautionScore">0</span>
          </div>
          <div class="sp-gauge-bar">
            <div class="sp-gauge-fill caution" id="cautionBar" style="width:0%"></div>
          </div>
        </div>
      </div>

      <!-- 종합 판단 -->
      <div class="sp-verdict" id="spVerdict">
        <span class="sp-verdict-label">종합 판단</span>
        <span class="sp-verdict-value" id="spVerdictValue">—</span>
      </div>

      <!-- 최근 신호 목록 -->
      <div class="sp-section-title">최근 신호</div>
      <ul class="sp-signal-list" id="spSignalList"></ul>
    </aside>
  </div>

  <!-- 백테스팅 화면 (기본 숨김) -->
  <div class="page hidden" id="page-backtest">
    <div class="bt-wrap">

      <!-- 전략 설정 패널 -->
      <div class="bt-config">
        <div class="bt-config-title">전략 설정</div>

        <div class="bt-form-group">
          <label>종목</label>
          <div class="search-wrap">
            <input type="text" id="btSearchInput" class="search-input" placeholder="종목명 또는 코드...">
            <ul id="btSearchResult" class="search-result hidden"></ul>
          </div>
          <span class="bt-selected-stock" id="btSelectedStock">선택 안됨</span>
        </div>

        <div class="bt-form-group">
          <label>매수 전략</label>
          <select id="btBuyStrategy" class="bt-select">
            <option value="golden_cross_5_20">골든크로스 (MA5×MA20)</option>
            <option value="golden_cross_20_60">골든크로스 (MA20×MA60)</option>
            <option value="pullback_ma20">눌림목 (20일선 반등)</option>
            <option value="pullback_ma60">눌림목 (60일선 반등)</option>
            <option value="rsi_oversold">RSI 과매도 탈출</option>
            <option value="bb_lower_break">볼린저 하단 이탈</option>
          </select>
        </div>

        <div class="bt-form-group">
          <label>매도 전략</label>
          <select id="btSellStrategy" class="bt-select">
            <option value="dead_cross_5_20">데드크로스 (MA5×MA20)</option>
            <option value="dead_cross_20_60">데드크로스 (MA20×MA60)</option>
            <option value="rsi_overbought">RSI 과매수 탈출</option>
            <option value="bb_upper_break">볼린저 상단 돌파</option>
            <option value="ma60_breakdown">60일선 이탈</option>
          </select>
        </div>

        <div class="bt-form-row">
          <div class="bt-form-group">
            <label>시작일</label>
            <input type="date" id="btStartDate" class="bt-input">
          </div>
          <div class="bt-form-group">
            <label>종료일</label>
            <input type="date" id="btEndDate" class="bt-input">
          </div>
        </div>

        <div class="bt-form-group">
          <label>초기 투자금 (원)</label>
          <input type="number" id="btInitCash" class="bt-input" value="10000000" step="1000000">
        </div>

        <button id="btRunBtn" class="bt-run-btn">▶ 백테스팅 실행</button>
      </div>

      <!-- 결과 패널 -->
      <div class="bt-result" id="btResult">
        <div class="bt-result-empty">
          <span>종목과 전략을 선택하고<br>백테스팅을 실행하세요</span>
        </div>
      </div>

    </div>
  </div>

  <!-- 하단 탭 네비게이션 (모바일) -->
  <nav class="bottom-tab">
    <button class="tab-item active" data-tab="chart">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>차트</span>
    </button>
    <button class="tab-item" data-tab="watchlist">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <span>관심</span>
    </button>
    <button class="tab-item" data-tab="backtest">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
      <span>백테스트</span>
    </button>
    <button class="tab-item" data-tab="portfolio">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>포트폴리오</span>
    </button>
  </nav>

  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
